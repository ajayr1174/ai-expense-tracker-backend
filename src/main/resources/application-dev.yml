spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/expense_tracker
    username: postgres
    password:
  config:
    activate:
      on-profile: dev
  devtools:
    restart:
      enabled: true
      poll-interval: 2s
      quiet-period: 1s

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          timezone: UTC

  flyway:
    enabled: true

server:
  port: 8080

bcrypt:
  strength: 12

jwt:
  secret-key: "mySuperSecretJwtKeyForAiExpenseTracker2026"
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

spring doc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
